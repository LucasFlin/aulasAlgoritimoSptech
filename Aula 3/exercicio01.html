<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1</title>
</head>
<body>
    <h1>Aposentadoria: Quanto falta?</h1>
    <p>Digite sua idade:</p>
    <input type="text" id="ipt_idade">
    <br><br>
    <button onclick="apHomem()">Aposentadoria Homem</button>
    <button onclick="apMulher()">Aposentadoria Mulher</button>
</body>
</html>
<script>
function apHomem(){
    alert("Faltam "+(70-Number(ipt_idade.value))+" anos para você se aposentar")
    }
function apMulher(){
    alert("Faltam "+(60-Number(ipt_idade.value))+" anos para você se aposentar")
}
</script>
