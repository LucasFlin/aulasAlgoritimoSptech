<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 7</title>
</head>
<body>
    <h1>Simulador de Transações Bancárias</h1>
    <h2 id="txt_msg"></h2>
    <button onclick="receber100()">Receber 100</button>
    <button onclick="receber50()">Receber 50</button>
</body>
</html>
<script>
    let saldo = 0
    function receber100(){
        saldo += 100
        txt_msg.innerHTML = `Transferência de R$100 recebida! Saldo atual: R$${saldo}`
    }
    function receber50(){
        saldo += 50
        txt_msg.innerHTML = `Transferência de R$50 recebida! Saldo atual: R$${saldo}`
    }
</script>
