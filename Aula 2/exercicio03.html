<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

</head>
<body>
    <h1>Exercício 3</h1>
    <p>Qual seu time?</p>
    <input type="text" id="ipt_time">
    <p>Quantos Títulos ele tem?</p>

    function time(){
        alert(`O time ${ipt_time.value} tem ${ipt_titulo.value} títulos`)
    }
</script>
