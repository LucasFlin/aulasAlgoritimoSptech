<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1</title>
</head>
<body>
    <h1>Exercicio 1</h1>
    <p>Digite sua cidade natal:</p>
    <input type="text" id="ipt_cidade">
    <p>Agora digite seu ano de nascimento:</p>
    <input type="date" id="ipt_dataNascimento">
    <br><br>
    <button onclick="cadastro()">Cadastrar</button>
</body>
</html>
<script>
    function cadastro(){
        alert(`Você nasceu na cidade de ${ipt_cidade.value} em ${ipt_dataNascimento.value}.`)
    }
</script>
