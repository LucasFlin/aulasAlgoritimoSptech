<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poupança</title>
</head>
<body>
    <h2>Poupança</h2>
    Entre com o valor mensal de depósito: <input id="ipt_deposito" type="number"> <br>
    Entre com a quantidade de meses: <input id="ipt_meses" type="number"> <br>
    Entre com o percentual de juros: <input id="ipt_juros" type="number"> <br> <br>
    Qual é o seu sonho: <input id="ipt_sonho"> <br>
    Qual o valor do seu sonho: <input id="ipt_valorSonho" type="number">
    <button onclick="projetar()">Projetar</button><br> <br>
    <div id="div_msg"></div>
</body>
<script>
    function projetar() {
        let deposito = Number(ipt_deposito.value)
        let meses = Number(ipt_meses.value)
        let porcento = (Number(ipt_juros.value))/100
        let sonho = ipt_sonho.value
        let valorSonho = Number(ipt_valorSonho.value)
        let valorInicial = 0
        let juros = (valorInicial * porcento)
        let valorFinal = valorInicial + juros + deposito

        div_msg.innerHTML = ''
        if(deposito > 0 && meses > 0 && (porcento > 0 && porcento < 10) && sonho.length >= 3 && (valorSonho >= 0 && valorSonho > deposito)){
            for(let i = 1; i <= meses; i++){
                
                div_msg.innerHTML += `<br>Mês = ${i} - Valor Inicial = R$ ${valorInicial.toFixed(2)} - Juros = R$ ${(juros.toFixed(2))} - Depósito = R$ ${deposito.toFixed(2)} - Valor Final = R$ ${valorFinal.toFixed(2)}`
                if(i != meses){
                valorInicial = valorFinal
                juros = (valorInicial * porcento)
                valorFinal = (valorInicial + juros + deposito)
                }
            }
        }
        console.log(`${deposito > 0} ${meses > 0} ${(porcento > 0 && porcento < 10)} ${sonho.length >= 3} ${(valorSonho >= 0 &&  valorSonho > deposito)}`)        
        
        let valorExtra = valorFinal-valorSonho
        if(valorExtra >= 0){
            div_msg.innerHTML += `<br>Parabéns você é um POUPADOR, além do seu sonho de ${sonho} ainda sobrou R$ ${valorExtra.toFixed(2)} para outras aquisições`
        }else{
            valorExtra=valorExtra*-1
            div_msg.innerHTML += `<br>Você precisa poupar um pouco mais. Para o sonho de ${sonho} ainda falta R$ ${valorExtra.toFixed(2)}`
        }
    }
</script>
</html>
