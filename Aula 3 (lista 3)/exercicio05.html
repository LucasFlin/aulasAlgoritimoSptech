<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 5</title>
</head>
<body>
    <h1>Média da SPTech</h1>
    <p>Digite a nota das continuadas:</p>
    <input type="text" id="ipt_continuada">
    <p>Agora digite a nota de Pesquisa e Inovação:</p>
    <input type="text" id="ipt_pi">
    <p>Qual seu nome?</p>
    <input type="text" id="ipt_nome">
    <br>
    <button onclick="media()">Calcular média</button>
    <p id="txt_media"></p>
</body>
</html>
<script>
 function media(){
    alert("A média de "+ipt_nome.value+" será de "+((Number(ipt_continuada.value)*0.4)+(Number(ipt_pi.value)*0.6)))
 }
</script>
