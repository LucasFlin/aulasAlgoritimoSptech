<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6</title>
</head>
<body>
    <h1>Calculadora</h1>
    <p>Escreva dois numeros:</p>
    <input type="text" id="ipt_n1"><samp> </samp><input type="text" id="ipt_n2">
    <br><br>
    <button onclick="somar()">Soma</button><samp> </samp><button onclick="subtrair()">Subtração</button><samp> </samp><button onclick="dividir()">Divisão</button><samp> </samp><button onclick="multiplicar()">Multiplicação</button>
</body>
</html>
<script>
    function somar(){
        alert(ipt_n1.value+"+"+ipt_n2.value+"="+(Number(ipt_n1.value)+Number(ipt_n2.value)))
    }
    function subtrair(){
        alert(ipt_n1.value+"-"+ipt_n2.value+"="+(Number(ipt_n1.value)-Number(ipt_n2.value)))
    }
    function dividir(){
        alert(ipt_n1.value+"/"+ipt_n2.value+"="+(Number(ipt_n1.value)/Number(ipt_n2.value)))
    }
    function multiplicar(){
        alert(ipt_n1.value+"*"+ipt_n2.value+"="+(Number(ipt_n1.value)*Number(ipt_n2.value)))
    }
</script>
