<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 11</title>
</head>
<body>
    <h1>Tabuada Interativa</h1>
    <h2>Escolha um número para ver a tabuada:</h2>
    <input type="text" id="ipt_numero">
    <br><br>
    <button onclick="taboada()">Ver taboada!</button>
    <p id="taboada1"></p>
    <p id="taboada2"></p>
    <p id="taboada3"></p>
    <p id="taboada4"></p>
    <p id="taboada5"></p>
    <p id="taboada6"></p>
    <p id="taboada7"></p>
    <p id="taboada8"></p>
    <p id="taboada9"></p>
</body>
</html>
<script>
    function taboada(){
        let num = Number(ipt_numero.value)

        taboada1.innerHTML = `${num} x 1 = ${num*1}`
        taboada2.innerHTML = `${num} x 2 = ${num*2}`
        taboada3.innerHTML = `${num} x 3 = ${num*3}`
        taboada4.innerHTML = `${num} x 4 = ${num*4}`
        taboada5.innerHTML = `${num} x 5 = ${num*5}`
        taboada6.innerHTML = `${num} x 6 = ${num*6}`
        taboada7.innerHTML = `${num} x 7 = ${num*7}`
        taboada8.innerHTML = `${num} x 8 = ${num*8}`
        taboada9.innerHTML = `${num} x 9 = ${num*9}`
    }
</script>
