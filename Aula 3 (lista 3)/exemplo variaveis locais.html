<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <span>Nota 1</span>
    <input type="number" id="ipt_n1">
    <span>Nota 2</span>
    <input type="number" id="ipt_n2">
    <button onclick="media()">Calcular Média</button>
    <div id="div_msg"></div>
    <!--div cria uma area separada, para agrupar-->
</body>
</html>
<script>
    function media(){
        let n1 = Number(ipt_n1.value)
        let n2 = Number(ipt_n2.value)
        let valorMedia = (n1+n2)/2
        div_msg.innerHTML = `A média é ${valorMedia}`;
    }
</script>
