<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 3</title>
</head>
<body>
    <h1>Economia com Bilhete Único</h1>
    <p>Quanto você paga na passagem?</p>
    <input type="text" id="ipt_passagem">
    <p>Quantas vezes você viaja por mês?</p>
    <input type="text" id="ipt_viagens">
    <button onclick="economia()">Ver economia</button>
</body>
</html>
<script>
    function economia(){
        alert("Você economizará R$" + ((Number(ipt_passagem.value)*Number(ipt_viagens.value))/2))
    }
</script>
