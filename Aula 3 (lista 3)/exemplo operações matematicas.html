<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Número 1:</p>
    <input type="text" id="ipt_n1">
    <p>Número 2:</p>
    <!--input#id-->
    <input type="text" id="ipt_n2">
    <button onclick="calcular()">Calcular</button>
</body>
</html>
<script>
    function calcular(){
        alert(`A soma é: ${Number(ipt_n1.value) + Number(ipt_n2.value)}`)
        alert(`A subtração é: ${Number(ipt_n1.value) - Number(ipt_n2.value)}`)
        alert(`A multiplicação é: ${Number(ipt_n1.value) * Number(ipt_n2.value)}`)
        alert(`A divisão é: ${Number(ipt_n1.value) / Number(ipt_n2.value)}`)
        alert(`O resto da divisão é: ${Number(ipt_n1.value) % Number(ipt_n2.value)}`)
        alert(`A raiz quadrada de ${ipt_n1.value} é: ${Number(ipt_n1.value) ** 0.5}`)
        alert(`A raiz quadrada de ${ipt_n2.value} é: ${Number(ipt_n2.value) ** 0.5}`)
        alert(`A potenciação é: ${Number(ipt_n1.value) ** Number(ipt_n2.value)}`)
    }
</script>
