<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 9</title>
</head>
<body>
    <h1>Calculadora das Fases do Sono</h1>
    <h3>Quantas horas você dormiu hoje?</h3>
    <input type="text" id="ipt_horas">
    <br>
    <button onclick="calcular()">Calcular</button>
    <p id="txt_calculo"></p>
    <p id="txt_fase1"></p>
    <p id="txt_fase2"></p>
    <p id="txt_fase3"></p>
    <p id="txt_rem"></p>
</body>
</html>
<script>
    function calcular(){
        let horas = Number(ipt_horas.value)
        txt_calculo.innerHTML = `Ao dormir ${horas}, você dormiu: `
        txt_fase1.innerHTML = `${(horas * 0.05).toFixed(2)} horas na fase 1`
        txt_fase2.innerHTML = `Ao dormir ${(horas * 0.45).toFixed(2)} horas na fase 2`
        txt_fase3.innerHTML = `Ao dormir ${(horas * 0.30).toFixed(2)} horas na fase 3`
        txt_rem.innerHTML = `Ao dormir ${(horas * 0.2).toFixed(2)} horas na fase REM`
    }
</script>
