<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 11</title>
</head>
<body>
    <h1>Analisador de Família: O Impacto dos Filhos no Entretenimento</h1>
    <p>Quantos filhos você tem? </p>
    <input type="text" id="ipt_filhos"> <br><br>
    <button onclick="analizar()">Analisar família</button>
    <p id="txt_filhos"></p>
</body>
</html>
<script>
    function analizar(){
        let filhos = Number(ipt_filhos.value)
        txt_filhos.innerHTML = ''

        if(filhos>=1){
            txt_filhos.innerHTML += '<br><br>Não tem TV'
        }
        if (filhos>=2){
            txt_filhos.innerHTML += '<br>Não tem internet'
        }
        if (filhos>=3){
            txt_filhos.innerHTML += '<br>Não tem video game'
        }
        if(filhos>=4){
            txt_filhos.innerHTML += '<br>Não tem Netflix'
        }
    } 
</script>
