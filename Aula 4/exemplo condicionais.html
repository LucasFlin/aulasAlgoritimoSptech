<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--input#ipt_idade+button{Mostrar Mensagem}-->
    <input type="text" id="ipt_idade">
    <button onclick="mostrarMensagem()">Mostrar Mensagem</button>
</body>
</html>
<script>
    function mostrarMensagem(){
        let idade = Number(ipt_idade.value)
        if(idade == 18){
            alert(`Você tem 18 anos!`)
        }
    }
</script>
