<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 13</title>
</head>
<body>
    <h1>Verificação de Média: Aprovado ou Reprovado?</h1>
    <h3>Digite duas notas:</h3>
    <p>Nota 1: </p>
    <input type="text" id="ipt_n1">
    <br><br>
    <p>Nota 2: </p>
    <input type="text" id="ipt_n2">
    <br><button onclick="media()">Verificar situação</button>
</body>
</html>
<script>
    function media(){
        let n1 = Number(ipt_n1.value)
        let n2 = Number(ipt_n2.value)
        let media = (n1+n2)/2

        if(media>=6){
            alert("Parabéns, aprovado!")
        }else{
            alert("Tente outra vez...")
        }
    }
</script>
