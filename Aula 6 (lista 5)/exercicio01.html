<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1</title>
</head>
<body>
    <h1>Altura e Esportes: Descubra Sua Vantagem Competitiva</h1>
    <p>Digite sua altura:</p>
    <input type="text" id="ipt_altura"><samp> m</samp>
    <br><button onclick="analise()">Analisar Estatura</button>
    <p id="txt_msg"></p>
</body>
</html>
<script>
    function analise(){
        let altura = Number(ipt_altura.value)

        if(altura <= 1.65){
            txt_msg.innerHTML = 'Você pode ser piloto de corrida'
        } else if(altura > 1.65 && altura <= 1.80){
            txt_msg.innerHTML = 'Você pode ser jogador de futebol'
        } else {
            txt_msg.innerHTML = 'Você pode ser jogador de vôlei e basquete'
        }
    }
</script>
