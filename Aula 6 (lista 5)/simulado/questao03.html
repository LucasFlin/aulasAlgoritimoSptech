<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h1>Calculadora SPFlix</h1>

  <div>
      <p>Qualidade (720p ou 1080p ou 4K):</p>
      <input type="text" id="ipt_qualidade">
  </div>

  <div style="display: flex; gap: 50px">
    <div>
      <p>Telas simultâneas - Na mesma casa:</p>
      <input type="text" id="ipt_qtd_telas">
    </div>

    <div>
      <p>Telas extras - Fora da residência:</p>
      <input type="text" id="ipt_qtd_telas_extras">
    </div>
  </div>

  <div>
    <p>Quer fazer download ('sim' ou 'nao'):</p>
    <input type="text" id="ipt_download">
  </div>

  <p></p>
  <button onclick="exibirResultado()">Exibir Resultado</button>

  <p></p>
  <div id="div_mensagem"></div>

</body>
</html>
<script>
function exibirResultado() {
    let qualidade = ipt_qualidade.value
    let telas = Number(ipt_qtd_telas.value)
    let telasExtras = Number(ipt_qtd_telas_extras.value)
    let total = 0
    let totalTelas = 0
    let numTelas = telas + telasExtras

    if (qualidade == '720p'){
        if (telas <= 2){
            totalTelas = 10+telasExtras*12.90
            total = (totalTelas+15).toFixed(2)
            div_mensagem.innerHTML = `O valor base do seu plano é R$15.00<br><br>O valor das telas do seu plano é R$${(totalTelas).toFixed(2)}<br><br>O valor total do seu plano é R$${total}<br><br>Se quiser dividir fica R$${(total/numTelas).toFixed(2)} pra cada!`
        } else if (telas == 3 || telas == 4){
            totalTelas = 20+telasExtras*12.90
            total = (totalTelas+15).toFixed(2)
            div_mensagem.innerHTML = `O valor base do seu plano é R$15.00<br><br>O valor das telas do seu plano é R$${(totalTelas).toFixed(2)}<br><br>O valor total do seu plano é R$${total}<br><br>Se quiser dividir fica R$${(total/numTelas).toFixed(2)} pra cada!`
        } else {
            totalTelas = 30+telasExtras*12.90
            total = (totalTelas+15).toFixed(2)
            div_mensagem.innerHTML = `O valor base do seu plano é R$15.00<br><br>O valor das telas do seu plano é R$${(totalTelas).toFixed(2)}<br><br>O valor total do seu plano é R$${total}<br><br>Se quiser dividir fica R$${(total/numTelas).toFixed(2)} pra cada!`
        }
    } else if (qualidade=='1080p'){
        if (telas <= 2){
            totalTelas = 10+telasExtras*12.90
            total = (totalTelas+20).toFixed(2)
            div_mensagem.innerHTML = `O valor base do seu plano é R$20.00<br><br>O valor das telas do seu plano é R$${(totalTelas).toFixed(2)}<br><br>O valor total do seu plano é R$${total}<br><br>Se quiser dividir fica R$${(total/numTelas).toFixed(2)} pra cada!`
        } else if (telas == 3 || telas == 4){
            totalTelas = 20+telasExtras*12.90
            total = (totalTelas+20).toFixed(2)
            div_mensagem.innerHTML = `O valor base do seu plano é R$20.00<br><br>O valor das telas do seu plano é R$${(totalTelas).toFixed(2)}<br><br>O valor total do seu plano é R$${total}<br><br>Se quiser dividir fica R$${(total/numTelas).toFixed(2)} pra cada!`
        } else {
            totalTelas = 30+telasExtras*12.90
            total = (totalTelas+20).toFixed(2)
            div_mensagem.innerHTML = `O valor base do seu plano é R$20.00<br><br>O valor das telas do seu plano é R$${(totalTelas).toFixed(2)}<br><br>O valor total do seu plano é R$${total}<br><br>Se quiser dividir fica R$${(total/numTelas).toFixed(2)} pra cada!`
        }
    } else if (qualidade=='4k'){
        if (telas <= 2){
            totalTelas = 10+telasExtras*12.90
            total = (totalTelas+25).toFixed(2)
            div_mensagem.innerHTML = `O valor base do seu plano é R$25.00<br><br>O valor das telas do seu plano é R$${(totalTelas).toFixed(2)}<br><br>O valor total do seu plano é R$${total}<br><br>Se quiser dividir fica R$${(total/numTelas).toFixed(2)} pra cada!`
        } else if (telas == 3 || telas == 4){
            totalTelas = 20+telasExtras*12.90
            total = (totalTelas+25).toFixed(2)
            div_mensagem.innerHTML = `O valor base do seu plano é R$25.00<br><br>O valor das telas do seu plano é R$${(totalTelas).toFixed(2)}<br><br>O valor total do seu plano é R$${total}<br><br>Se quiser dividir fica R$${(total/numTelas).toFixed(2)} pra cada!`
        } else {
            totalTelas = 30+telasExtras*12.90
            total = (totalTelas+25).toFixed(2)
            div_mensagem.innerHTML = `O valor base do seu plano é R$25.00<br><br>O valor das telas do seu plano é R$${(totalTelas).toFixed(2)}<br><br>O valor total do seu plano é R$${total}<br><br>Se quiser dividir fica R$${(total/numTelas).toFixed(2)} pra cada!`
        }
    }
}
</script>
