<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6</title>
</head>
<body>
    <h1>Classificação de Alunos: Como Está Seu Desempenho?</h1>
    <p>Qual foi a nota do aluno?</p>
    <input type="text" id="ipt_nota"><br>
    <button onclick="nota()">Classificar aluno</button>
</body>
</html>
<script>
    function nota(){
        let nota = Number(ipt_nota.value)

        if (nota < 5){
            alert('Aluno precisa de muita ajuda')
        } else if (nota >= 5 && nota <= 7){
            alert('Aluno na média')
        } else if (nota > 7 && nota <= 9.5){
            alert('Aluno acima da média')
        }else{
            alert('Aluno fora da curva')
        }
    }
</script>
