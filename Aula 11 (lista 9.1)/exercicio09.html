<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 9</title>
</head>
<body>
    <div id="div_fb"></div>
</body>
</html>
<script>
    for (let i = 0; i <= 100; i++){
        if (i % 3 == 0 && i % 5 != 0){
            div_fb.innerHTML += `Fizz <br>`
        } else if (i % 3 != 0 && i % 5 == 0){
            div_fb.innerHTML += `Buzz <br>`
        } else if (i % 3 == 0 && i % 5 == 0){
            div_fb.innerHTML += `FizzBuzz <br>`
        } else {
            div_fb.innerHTML += `${i} <br>`
        }
    }
</script>
