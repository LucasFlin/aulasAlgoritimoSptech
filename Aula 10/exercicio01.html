<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contagem</title>
</head>
<body>
    <button onclick="contar()">Contagem</button>
    <div id="div_conta"></div>
</body>
</html>
<script>
    function contar(){
        let i = 1
        while(i <= 15){
            div_conta.innerHTML += `Contagem: ${i} <br>`
            i++
        }
    }
</script>
