<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanji</title>
</head>

<body>
    <h1>CRUD do Sanji</h1>
    <p>Quantas comidas foram feitas?</p>
    <input type="text" id="ipt_comida">
    <button onclick="cadastrar()">Cadastrar Estoque de Comida</button> <button onclick="pesquisar()">Pesquisar</button>
    <div id="div_pesquisa"></div>
    <br>
    <br>
    <button onclick="verificar()">Verificar Quantidade</button>
    <div id="div_comida"></div>
    <br>
    <br>
    <button onclick="estoque()"> Exibir Estoque</button>
    <div id="div_estoque"></div>
    <br><br>
    <p>Alterar nome</p>
    <input type="text" id="ipt_nome" placeholder="Nome atual"> <input type="text" id="ipt_troca" placeholder="Novo nome">
    <button onclick="alterar()">Alterar</button>
    <div id="div_troca"></div>
    <br>
    <p>Remover comida</p>
    <input type="text" id="ipt_del"> <button onclick="deletar()">Deletar</button>
    <div id="div_del"></div>
</body>

</html>
<script>
    let comida = []
    function cadastrar() {
        comida.push(ipt_comida.value)
        console.log(comida)
    }
    function verificar() {
        if (comida.length < 3) {
            div_comida.innerHTML = 'Desse jeito, o Luffy devora até o navio'
        } else if (comida.length >= 3 && comida.length <= 7) {
            div_comida.innerHTML = 'O comilão do Luffy não vai deixar sobrar nenhuma comida'
        } else if (comida.length >= 8 && comida.length < 10) {
            div_comida.innerHTML = 'Assim, talvez sobre um pouco para a tripulação'
        } else if (comida.length > 10) {
            div_comida.innerHTML = 'Desse jeito vai ter comida para todo mundo e ainda consigo guardar um pouco para a senhorita Nami!'
        }
    }
    function pesquisar() {
        let food = ipt_comida.value
        let quantidade = 0

        for (let i = 0; i <= comida.length; i++) {

            if (comida[i] == food) {
                quantidade++
            }
        }
        if (quantidade == 0) {
            div_pesquisa.innerHTML = `Alguém vai ter que comprar ${food}, tá fazendo falta...`
        } else if (quantidade == 1) {
            div_pesquisa.innerHTML = `Temos a comida ${food} e há 1 unidade dela`
        } else {
            div_pesquisa.innerHTML = `Temos a comida ${food} e há ${quantidade} unidades dela`
        }
    }
    function estoque() {
        let estoque = []
        div_estoque.innerHTML = ''
        for (let i = 0; i < comida.length; i++) {
            let qnt = 0
            let food = comida[i]
            let ultimo = comida.lastIndexOf(comida[i])
            

            if (comida.indexOf(comida[i]) != comida.lastIndexOf(comida[i])) {
                estoque.push(comida[i])

                for (let j = 0; j <= comida.length; j++) {
                    if (estoque[j] == comida[i]) {
                        qnt++
                    }
                }
            }
            console.log(qnt)
            if (i == ultimo) {
                let quantidade = qnt == 0 ? '(1 unidade)' : `(${qnt} unidades)`
                div_estoque.innerHTML += `- ${food} ${quantidade}<br>`
            }
        }
    }
    function alterar(){
        let nomeAntigo = ipt_nome.value
        let nomeNovo = ipt_troca.value

        if(comida.includes(nomeAntigo)){
            for (let i = 0; i <= comida.length; i++){
                if(comida[i] == nomeAntigo){
                    comida[i] = nomeNovo
                }
            }
            div_troca.innerHTML = `A comida '${nomeAntigo}' foi alterada para '${nomeNovo}'`

        } else {
            div_troca.innerHTML = `A comida '${nomeAntigo}' não foi encontrada no estoque`
        }
    }
    function deletar(){
        let del = ipt_del.value

        if(comida.includes(del)){
            for (let i = 0; i <= comida.length; i++){
                if(comida[i] == del){
                    comida.splice(i, 1)
                    i--
                }
            }
            div_del.innerHTML = `A comida '${del}' foi removida do estoque`

        } else {
            div_del.innerHTML = `A comida '${del}' não foi encontrada no estoque`
        }
    }
</script>
