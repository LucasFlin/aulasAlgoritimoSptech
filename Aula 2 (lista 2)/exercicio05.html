<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 5</title>
</head>
<body>
    <h1>Exercício 5</h1>
    <p>Escreva sua nota:</p>
    <input type="text" id="ipt_nota">
    <br><br>
    <button onclick="opiniaoVo()">Opinião da Vó</button>
    <p id="opn_vo"></p>
    <button onclick="opiniaoMae()">Opinião da Mãe</button>
    <p id="opn_mae"></p>
</body>
</html>
<script>
    function opiniaoVo(){
        opn_vo.innerHTML = `Muito bem, que neto inteligente, porque tirou ${ipt_nota.value}`
    }
    function opiniaoMae(){
        opn_mae.innerHTML = `Não fez mais que tua obrigação com essa nota ${ipt_nota.value}`
    }
</script>
