<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Múltiplos de 5</title>
</head>
<body>
    <h1>Múltiplos de 5</h1>
    <p>Digite um número entre 20 e 100: <input type="text" id="ipt_num"></p>
    <button onclick="multiplos()">Adoro múltiplos de 5</button>
    <div id="div_multiplos"></div>
</body>
</html>
<script>
    function multiplos(){
        let i = 0
        let num = Number(ipt_num.value)
        div_multiplos.innerHTML = ''
        if(num >= 20 && num <= 100){
            while(i <= num){
                if((i % 5) == 0){
                    div_multiplos.innerHTML += `<br>${i}`
                    i++
                }else {
                    i++
                }
            }
        }
    }
</script>
