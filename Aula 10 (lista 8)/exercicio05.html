<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numeros cabalisticos</title>
</head>
<body>
    <h1>Números Misteriosos</h1>
    <button onclick="mostrar()">Números Cabalisticos</button>
    <div id="div_n"></div>
</body>
</html>
<script>
    function mostrar(){
        let i = 1
        while (i <= 30){
            if (i == 3 || i == 4 || i == 7 || i == 10 || i == 12){
                i++
            }else{
                div_n.innerHTML += `<br>${i}`
                i++ 
            }
        }
    }
</script>
