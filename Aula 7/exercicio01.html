<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1</title>
</head>
<body>
    <h1>Sistema de Avaliação de Atendimento: Dê Sua Nota!</h1>
    <p>Digite sua nota para o atendimento:</p>
    <input type="text" id="ipt_nota">
    <br>
    <button onclick="avaliar()">Avaliar Atendimento</button>
    <br>
    <div id="div_msg"></div>
</body>
</html>
<script>
    function avaliar(){
        let nota = Number(ipt_nota.value)

        if (nota > 10 || nota < 0){
            div_msg.innerHTML = `Nota Invalida`
        }else if (nota >= 0 && nota < 5){
            div_msg.innerHTML = `Não aprovado`
        }else if (nota >= 5 && nota <= 6){
            div_msg.innerHTML = `Neutro`
        }else {
            div_msg.innerHTML = `Aprovado`
        }
    }
</script>
