<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 5</title>
</head>
<body>
    <h1>Cálculo da Conta de Luz</h1>
    <p>Quantos KWh foram consumidos esse mês? </p>
    <input type="text" id="ipt_kwh"> <br><br>
    <button onclick="calcular()">Calcular conta de luz</button>
</body>
</html>
<script>
    function calcular(){
        let kwh = Number(ipt_kwh.value)
        let conta = kwh*0.85
        if(conta<100){
            conta = conta-(conta*0.1)
        }
        alert(`Você pagará R$${conta}`)
    }
</script>
