<body>
    <h1>Cheque Especial do Banco XPTO</h1>
    <p>Digite o saldo da conta:</p>
    <input type="text" id="ipt_saldo">
    <p>Quanto você quer debitar? </p>
    <input type="text" id="ipt_debito"><br><br>
    <button onclick="checar()">Analizar conta</button>
    <div id="txt_saldo"></div>
</body>
</html>
<script>
    function checar(){
        let saldo = Number(ipt_saldo.value)
        let debito = Number(ipt_debito.value)
        saldo = saldo-debito
        let mensagem = saldo < 0 ? `<span style="color: red;font-weight: bold;"> O saldo atual da conta corrente é R$${saldo} </span>` : `O saldo atual da conta corrente é R$${saldo}`
        txt_saldo.innerHTML = mensagem

</script>
