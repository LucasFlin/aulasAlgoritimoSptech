<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 9</title>
</head>
<body>
    <h1>Tempo Gasto com Séries</h1>
    <p>Qual o último SITCON que você assistiu? </p>
    <input type="text" id="ipt_serie">
    <p>Quantos episódios você assistiu? </p>
    <input type="text" id="ipt_eps">
    <br> <button onclick="calcular()">Verificar nivel</button>
    <div id="txt_final"></div>
</body>
</html>
<script>
    function calcular(){
        let serie = ipt_serie.value
        let eps = Number(ipt_eps.value)
        let nivel = (eps*22)/60
        
        txt_final.innerHTML = `Vejo que você gosta da série ${serie}`
        if (nivel > 30){
            txt_final.innerHTML += `<br>Uau, você realmente gosta dessa série!`
        }
    }
</script>
