<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6</title>
</head>
<body>
    <h1>Análise de Financiamento Habitacional</h1>
    <p>Qual o valor da renda familiar? </p>
    <input type="text" id="ipt_renda">
    <p>Qual o valor da prestação? </p>
    <input type="text" id="ipt_prestacao">
    <br><br><button onclick="financiamento()">Verificar financiamento</button>
    <div id="txt_renda"></div>
</body>
</html>
<script>
    function financiamento(){
        let renda = Number(ipt_renda.value)
        let prestacao = Number(ipt_prestacao.value)
        let porcento = ((prestacao/renda)*100).toFixed(1)
        txt_renda.innerHTML = ''
        txt_renda.innerHTML += `<br>A prestação corresponde a ${porcento}% da renda familiar`
        if (porcento > 30){
            txt_renda.innerHTML += '<br><br><span style="color: red;font-weight: bold;">Será necessário complementar a renda familiar</span>'
        }
    }
</script>
