<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 14</title>
</head>
<body>
    <h1>Autoescola Inteligente: Você Já Pode Tirar a CNH?</h1>
    <p>Qual seu nome?</p>
    <input type="text" id="ipt_nome">
    <p>Quantos anos você tem? </p>
    <input type="text" id="ipt_idade"> <br> <br>
    <button onclick="avaliar()">Avaliar aluno</button>
</body>
</html>
<script>
    function avaliar(){
        let nome = ipt_nome.value
        let idade = Number(ipt_idade.value)

        if(idade>=18){
            alert(`${nome}, vamos tirar a CNH?`)
        }else{
            alert(`${nome}, vai jogar PlayStation!`)
        }
    }
</script>
