<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 12</title>
</head>
<body>
    <h1>Controle de Peso no Elevador: Segurança em Primeiro Lugar</h1>
    <p>Digite o peso no elevador: </p>
    <input type="text" id="ipt_peso"><br><button onclick="ligarElevador()">Ligar elevador</button>
</body>
</html>
<script>
    function ligarElevador(){
        let peso = Number(ipt_peso.value)

        if(peso<500){
            alert("Elevador vai se mover")
        }else{
            alert("Alguém prescisa descer do elevador")
        }
    }
</script>
