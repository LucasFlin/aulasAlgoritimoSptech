<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 10</title>
</head>
<body>
    <h1>Situação Financeira da Conta Bancária</h1>
    <p>Qual o valor do saldo na sua conta do banco? </p>
    <input type="text" id="ipt_saldo">
    <br><br><button onclick="financas()">Verificar finanças</button>
    <div id="txt_saldo"></div>
</body>
</html>
<script>
    function financas(){
        let saldo = Number(ipt_saldo.value)
        if(saldo == 0){
            txt_saldo.innerHTML = `Conta zerada`
        }else if(saldo<0){
            txt_saldo.innerHTML = `<span style='color: red;'>Está devendo!</span>`
        }else{
            txt_saldo.innerHTML = `<span style='color: blue;'>Saldo positivo! :D</span>`
        }
    }
</script>
